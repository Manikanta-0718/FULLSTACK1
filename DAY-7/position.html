<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        text-transform: uppercase;
        position: absolute;
      }
      .parent {
        width: 500px;
        height: 400px;
        background-image: url("anime.jpg");
        position: relative;
      }

      .child1 {
        background-color: green;
        border: 2px solid black;
        top: 0px;
        left: 0px;
      }
      .child2 {
        background-color: rgb(255, 217, 0);
        border: 2px solid black;
        top: 0px;
        right: 0px;
      }
      .child3 {
        background-color: rgb(0, 238, 255);
        border: 2px solid black;
        
      }
      .child4 {
        background-color: rgb(255, 0, 0);
        border: 2px solid black;
        bottom: 0px;
        left: 0px;
      }
      .child5 {
        background-color:rgb(203, 15, 15);
        border: 2px solid black;
        bottom: 0px;
        right: 0px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">Top left</div>
      <div class="child2">Top right</div>
      <div class="child3">Center</div>
      <div class="child4">Bottom left</div>
      <div class="child5">Bottom right</div>
    </div>
  </body>
</html>
