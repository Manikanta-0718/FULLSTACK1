<html>
  <head>
    <title>forms</title>
  </head>
  <body>
    <h2>Placeholder</h2>
    <form>
      <input type = "type" name = "name" placeholder = "Enter Your Name"/><br><br>
      <input type = "email" name = "email" placeholder = "Enter Your Email"/><br><br>

      <input type = "password" placeholder = "Enter Your password" /><br><br>
      <input type = "number" name = "age" placeholder= "Enter Your Age"/><br><br>
      

      <label>Enter your gender:</label>
      <input type = "radio" name = "Gender" id = "m" value = "Male"/>
      <label for = "m">Male:</label>
      <input type = "radio" name = "Gender" id = "f" value = "Female"/>
      <label for = "f">Feamale:</label> <br><br>

      <label for = "nation">Nationality:</label>
      <select id = "Nationality" name = "Nationality">
        <option value = "India">India</option>
        <option value = "USA">USA</option>
        <option value = "UK">UK</option>
      </select><br><br>

      <lable>Skills:</lable>
      <input type = "checkbox" name = "skills" id = "j" value = "Java"/>
      <label for = "j">Java</label>
      <input type = "checkbox" name = "skills" id = "c" value = "C"/>
      <label for = "c">C</label>
      <input type = "checkbox" name = "skills" id = "p" value = "Python"/>
      <label for = "p">Python</label><br><br>
      <label for = "feedback">Feedback:</label><br>
      <textarea id = "feedback" name = "feedback"></textarea><br><br>
      <input type = "reset"/><br><br>
      <input type = "submit"/>
    </form>
  </body>
</html>
